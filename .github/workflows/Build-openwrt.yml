name: 编译openwrt (Compile openwrtwrt)

on:
  schedule:
    - cron: 0 3 * * 3,6
  repository_dispatch:
  workflow_dispatch:

env:
  TZ: Asia/Shanghai
  OPENWRT_DIR: /workdir/openwrt
  SOURCE_CODE_URL_FILE: ${{ github.workspace }}/config/openwrt-url.txt

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
    - name: 检查仓库 (Checkout Repository)
      uses: actions/checkout@main
      with:
        fetch-depth: 1

    - name: 设置系统时区 (Set System Timezone)
      run: |
        sudo timedatectl set-timezone "$TZ"
        date

    - name: 创建工作目录 (Create Work Directory)
      run: |
        sudo mkdir -p /workdir
        sudo chown $USER:$GROUPS /workdir
        echo "Work directory created at /workdir"

    - name: 释放磁盘空间 (Free Disk Space)
      uses: jlumbroso/free-disk-space@main
      with:
        tool-cache: false
        android: true
        dotnet: true
        haskell: true
        large-packages: true
        docker-images: true
        swap-storage: true

    - name: 检查可用磁盘空间 (Check Available Disk Space)
      run: |
        echo "Available disk space before installing packages:"
        df -h

    - name: 安装必要软件包 (Install Necessary Packages)
      run: |
        echo "Installing necessary packages..."
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          ecj \
          fastjar \
          file \
          flex \
          g++ \
          gcc-multilib \
          g++-multilib \
          gawk \
          gettext \
          git \
          git-core \
          java-propose-classpath \
          libelf-dev \
          libncurses5-dev \
          libncursesw5-dev \
          libssl-dev \
          swig \
          python3 \
          python3-pip \
          python3-dev \
          python3-setuptools \
          python3-pyelftools \
          subversion \
          unzip \
          wget \
          zlib1g-dev \
          rsync \
          qemu-utils \
          zip \
          libfuse-dev \
          neofetch \
          p7zip-full \
          curl \
          device-tree-compiler \
          gperf \
          haveged \
          help2man \
          intltool \
          lib32gcc-s1 \
          libc6-dev-i386 \
          libglib2.0-dev \
          libgmp3-dev \
          libltdl-dev \
          libmpc-dev \
          libmpfr-dev \
          libncurses-dev \
          libpython3-dev \
          libreadline-dev \
          libtool \
          libyaml-dev \
          libz-dev \
          lld \
          llvm \
          lrzsz \
          mkisofs \
          msmtp \
          nano \
          ninja-build \
          p7zip \
          patch \
          pkgconf \
          python3-ply \
          python3-docutils \
          re2c \
          rsync \
          scons \
          squashfs-tools \
          texinfo \
          uglifyjs \
          upx-ucl \
          vim \
          xmlto \
          xxd \
          zstd
        pip install requests tqdm
        echo "Packages installed successfully"

    - name: 检查可用磁盘空间 (Check Available Disk Space After Package Installation)
      run: |
        echo "Available disk space after installing packages:"
        df -h

    - name: 拉取源码 (Pull Source Code)
      if: steps.cache-openwrt.outputs.cache-hit != 'true'
      working-directory: /workdir
      run: |
        echo "Cloning source code from: $(cat ${{ env.SOURCE_CODE_URL_FILE }})"
        git clone $(cat ${{ env.SOURCE_CODE_URL_FILE }}) openwrt
        echo "Source code cloned successfully"

    - name: 链接源码目录 (Link Source Code Directory)
      run: |
        ln -sf ${{ env.OPENWRT_DIR }} ${{ github.workspace }}/openwrt
        echo "Linked source code to workspace"

    - name: 更新源码 (Update Source Code)
      working-directory: ${{ env.OPENWRT_DIR }}
      run: |
        git fetch --all
        git reset --hard origin/HEAD
        echo "Source code updated to latest version"

    - name: 更新Feed (Update Feeds)
      working-directory: ${{ env.OPENWRT_DIR }}
      run: |
        ./scripts/feeds update -a
        echo "Feeds updated successfully"

    - name: 安装Feed (Install Feeds)
      working-directory: ${{ env.OPENWRT_DIR }}
      run: |
        ./scripts/feeds install -a
        echo "Feeds installed successfully"

    - name: 准备配置并下载包 (Prepare Config and Download Packages)
      working-directory: ${{ env.OPENWRT_DIR }}
      run: |
        echo "System information:"
        sudo neofetch || echo "neofetch not available"

        echo "Copying configuration file..."
        wget https://downloads.openwrt.org/snapshots/targets/mediatek/filogic/config.buildinfo -O  .config

        echo "Starting package downloads..."
        bash ${{ github.workspace }}/script/x-wrt-make-001.sh
        echo "Configuration and package preparation completed"

    - name: 编译固件 (Compile Firmware)
      working-directory: ${{ env.OPENWRT_DIR }}
      run: |
        echo "开始编译 (Starting compilation)"
        echo -e "$(nproc) thread compile"
        echo "编译已开始，日志文件 make.log (Compilation started, log in make.log)"

        # 检查配置
        if [ ! -f ".config" ]; then
          echo "错误：配置文件不存在 (Error: Config file does not exist)"
          exit 1
        fi

        # 开始编译
        make -j$(nproc) V=s 2>&1 | tee make.log

        # 检查编译结果
        if [ ${PIPESTATUS[0]} -ne 0 ]; then
          echo "编译失败 (Compilation failed)"
          tail -50 make.log
          exit 1
        fi

        echo "编译成功完成 (Compilation completed successfully)"

        # 提取设备名称
        grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME
        if [ -s DEVICE_NAME ]; then
          echo "DEVICE_NAME=_$(cat DEVICE_NAME)" >> $GITHUB_ENV
          echo "Detected device: $(cat DEVICE_NAME)"
        else
          echo "DEVICE_NAME=_unknown or _all" >> $GITHUB_ENV
          echo "Could not detect device name"
        fi

        echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV
        echo "Build date: $(date)"

    - name: 压缩固件文件 (Compress Firmware Files)
      working-directory: ${{ env.OPENWRT_DIR }}
      run: |
        echo "压缩bin目录...... (Compressing bin directories ......)"

        # 检查bin目录是否存在
        if [ ! -d "bin" ]; then
          echo "错误：bin目录不存在 (Error: bin directory does not exist)"
          exit 1
        fi

        # 创建压缩文件
        7z a -mx=9 -mmt=$(nproc) bin.7z bin/
        echo "Bin directory compressed to bin.7z"

        # 移动到目标位置
        TARGET_DIR="bin/targets/mediatek/filogic"
        if [ -d "$TARGET_DIR" ]; then
          mv bin.7z "$TARGET_DIR/"
          mv make.log "$TARGET_DIR/"
          echo "Files moved to $TARGET_DIR"
        else
          echo "警告：目标目录不存在 $TARGET_DIR (Warning: Target directory does not exist: $TARGET_DIR)"
        fi

    - name: 检查最终空间使用情况 (Check Final Space Usage)
      if: always()
      run: |
        echo "Final disk usage:"
        df -hT
        echo "OpenWRT directory size:"
        du -sh ${{ env.OPENWRT_DIR }}

    - name: 上传完整bin目录 (Upload Full Bin Directory)
      uses: actions/upload-artifact@main
      with:
        name: OpenWrt_bin${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: ${{ env.OPENWRT_DIR }}/bin
        retention-days: 30
        compression-level: 9

    - name: 整理固件文件 (Organize Firmware Files)
      id: organize
      run: |
        FIRMWARE_DIR="${{ env.OPENWRT_DIR }}/bin/targets/mediatek/filogic"

        if [ -d "$FIRMWARE_DIR" ]; then
          cd "$FIRMWARE_DIR"
          echo "Removing packages directory..."
          rm -rf packages

          echo "FIRMWARE=$FIRMWARE_DIR" >> $GITHUB_ENV
          echo "Found firmware in: $FIRMWARE_DIR"

          # 列出找到的固件文件
          ls -la *.bin *.img || echo "No firmware files found"
        else
          echo "错误：固件目录不存在 $FIRMWARE_DIR (Error: Firmware directory does not exist: $FIRMWARE_DIR)"
          exit 1
        fi

    - name: 上传固件文件 (Upload Firmware Files)
      uses: actions/upload-artifact@main
      with:
        name: OpenWrt_firmware${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: ${{ env.FIRMWARE }}
        retention-days: 30
        compression-level: 9

    - name: 生成发布标签 (Generate Release Tags)
      id: tag
      run: |
        RELEASE_TAG=$(date +"%Y.%m.%d-%H%M")-immortalwrt
        echo "release_tag=$RELEASE_TAG" >> $GITHUB_OUTPUT
        echo "Generated release tag: $RELEASE_TAG"

        touch release.txt
        echo "ImmortalWRT Build - $RELEASE_TAG" > release.txt
        echo "Built on: $(date)" >> release.txt
        echo "Device: ${{ env.DEVICE_NAME }}" >> release.txt
        echo "Target: mediatek/filogic" >> release.txt

        bash ${{ github.workspace }}/script/immortalwrt-actions-txt.sh >> release.txt

    - name: 发布固件 (Release Firmware)
      uses: softprops/action-gh-release@master
      if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ steps.tag.outputs.release_tag }}
        name: "ImmortalWRT Build ${{ steps.tag.outputs.release_tag }}"
        body_path: release.txt
        files: ${{ env.FIRMWARE }}/*
        draft: false
        prerelease: false
