name: 编译immortalwrt (Compile immortalwrt)

on:
  schedule:
    - cron: '0 3 * * 3,6'
  repository_dispatch:
  workflow_dispatch:

env:
  TZ: Asia/Shanghai
  OPENWRT_DIR: /workdir/openwrt
  SOURCE_CODE_URL_FILE: ${{ github.workspace }}/config/immortalwrt-url.txt

jobs:
  prepare:
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: 检查仓库 (Checkout Repository)
        uses: actions/checkout@main
        with:
          fetch-depth: 1

      - name: 生成编译矩阵 (Generate Build Matrix)
        id: set-matrix
        run: |
          ENABLE_FILE="${{ github.workspace }}/config/immortalwrt-mt7981-enable-configs.txt"
          CONFIG_DIR="${{ github.workspace }}/config/immortalwrt-mt7981"

          if [ ! -f "$ENABLE_FILE" ]; then
            echo "::error::启用配置文件不存在: $ENABLE_FILE"
            exit 1
          fi

          mapfile -t ENABLED_DEVICES < <(grep -v '^[[:space:]]*#' "$ENABLE_FILE" | grep -v '^[[:space:]]*$')
          if [ ${#ENABLED_DEVICES[@]} -eq 0 ]; then
            echo "::error::启用配置文件中未包含任何设备"
            exit 1
          fi
          echo "启用的设备: ${ENABLED_DEVICES[*]}"

          declare -A LATEST_CONFIGS
          declare -A LATEST_DATETIME
          while IFS= read -r -d '' file; do
            filename=$(basename "$file")
            if [[ "$filename" =~ ^immortalwrt-actions-mt7981-(.+)-([0-9]{14})\.config$ ]]; then
              device="${BASH_REMATCH[1]}"
              datetime="${BASH_REMATCH[2]}"
              if [[ " ${ENABLED_DEVICES[*]} " == *" $device "* ]]; then
                if [[ -z "${LATEST_CONFIGS[$device]}" ]] || [[ "$datetime" > "${LATEST_DATETIME[$device]}" ]]; then
                  LATEST_CONFIGS["$device"]="$file"
                  LATEST_DATETIME["$device"]="$datetime"
                fi
              fi
            fi
          done < <(find "$CONFIG_DIR" -maxdepth 1 -type f -name "immortalwrt-actions-mt7981-*.config" -print0)

          for dev in "${!LATEST_CONFIGS[@]}"; do
            echo "设备 [$dev] 使用配置: ${LATEST_CONFIGS[$dev]} (日期: ${LATEST_DATETIME[$dev]})"
          done

          JSON_ARRAY="["
          first=true
          for dev in "${ENABLED_DEVICES[@]}"; do
            if [ -n "${LATEST_CONFIGS[$dev]}" ]; then
              if [ "$first" = true ]; then
                first=false
              else
                JSON_ARRAY+=","
              fi
              JSON_ARRAY+="{\"device\":\"$dev\",\"config\":\"${LATEST_CONFIGS[$dev]}\"}"
            else
              echo "::warning::设备 [$dev] 未找到配置文件，已跳过"
            fi
          done
          JSON_ARRAY+="]"

          echo "matrix=$JSON_ARRAY" >> $GITHUB_OUTPUT
          echo "::group::生成的矩阵 JSON"
          echo "$JSON_ARRAY" | jq .
          echo "::endgroup::"

  compile:
    needs: prepare
    if: needs.prepare.outputs.matrix != '[]'
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.prepare.outputs.matrix) }}
    env:
      DEVICE_NAME: ${{ matrix.device }}
      CONFIG_FILE: ${{ matrix.config }}
    steps:
      - name: 检查仓库 (Checkout Repository)
        uses: actions/checkout@main
        with:
          fetch-depth: 1

      - name: 设置系统时区 (Set System Timezone)
        run: |
          sudo timedatectl set-timezone "$TZ"
          date

      - name: 创建工作目录 (Create Work Directory)
        run: |
          sudo mkdir -p /workdir
          sudo chown $USER:$GROUPS /workdir

      - name: 释放磁盘空间 (Free Disk Space)
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: 安装必要软件包 (Install Necessary Packages)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential ecj fastjar file flex g++ gcc-multilib g++-multilib gawk gettext git git-core \
            java-propose-classpath libelf-dev libncurses5-dev libncursesw5-dev libssl-dev swig python3 \
            python3-pip python3-dev python3-setuptools python3-pyelftools subversion unzip wget zlib1g-dev \
            rsync qemu-utils zip libfuse-dev neofetch p7zip-full curl device-tree-compiler gperf haveged \
            help2man intltool lib32gcc-s1 libc6-dev-i386 libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev \
            libmpfr-dev libncurses-dev libpython3-dev libreadline-dev libtool libyaml-dev libz-dev lld llvm \
            lrzsz mkisofs msmtp nano ninja-build p7zip patch pkgconf python3-ply python3-docutils re2c \
            scons squashfs-tools texinfo uglifyjs upx-ucl vim xmlto xxd zstd zstd
          pip install requests tqdm

      - name: 拉取源码 (Pull Source Code)
        working-directory: /workdir
        run: |
          git clone $(cat ${{ env.SOURCE_CODE_URL_FILE }}) openwrt

      - name: 链接源码目录 (Link Source Code Directory)
        run: |
          ln -sf ${{ env.OPENWRT_DIR }} ${{ github.workspace }}/openwrt

      - name: 更新源码 (Update Source Code)
        working-directory: ${{ env.OPENWRT_DIR }}
        run: |
          git fetch --all
          git reset --hard origin/HEAD

      - name: 更新并安装Feeds
        working-directory: ${{ env.OPENWRT_DIR }}
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 准备配置文件
        working-directory: ${{ env.OPENWRT_DIR }}
        run: |
          cp "${{ env.CONFIG_FILE }}" .config
          bash ${{ github.workspace }}/script/x-wrt-make-001.sh

      - name: 编译固件（捕获退出码，不立刻终止）
        id: compile
        working-directory: ${{ env.OPENWRT_DIR }}
        run: |
          THREAD_COUNT=$(($(nproc) + 1))
          echo "使用 $THREAD_COUNT 线程编译"

          # 记录退出码，不中断脚本以便后续处理
          make -j$THREAD_COUNT V=s 2>&1 | tee make.log
          EXIT_CODE=${PIPESTATUS[0]}

          if [ $EXIT_CODE -eq 0 ]; then
            echo "编译成功完成！"
            echo "compile_completed=true" >> $GITHUB_OUTPUT
          else
            echo "编译失败，退出码: $EXIT_CODE"
            tail -100 make.log
            echo "compile_completed=false" >> $GITHUB_OUTPUT
            # 注意：不 exit 1，让工作流继续执行失败处理步骤
          fi

      # ---------- 编译失败处理 ----------
      - name: 上传失败日志 (Upload Failure Log)
        if: steps.compile.outputs.compile_completed == 'false'
        uses: actions/upload-artifact@main
        with:
          name: failed-build-log-${{ matrix.device }}-${{ github.run_id }}
          path: ${{ env.OPENWRT_DIR }}/make.log
          retention-days: 7

      - name: 生成失败 Release 信息
        if: steps.compile.outputs.compile_completed == 'false'
        id: failed_release
        run: |
          BUILD_DATETIME=$(date +"%Y%m%d%H%M")
          RELEASE_TAG="${{ matrix.device }}-failed-${BUILD_DATETIME}-${{ github.run_id }}"
          echo "release_tag=$RELEASE_TAG" >> $GITHUB_OUTPUT

          cat > release_failed.txt <<EOF
          ⚠️ 编译失败 - ${{ matrix.device }}
          ==========================================
          Build Date: $(date)
          Device: ${{ matrix.device }}
          Target: mediatek/filogic
          Config File: $(basename "${{ env.CONFIG_FILE }}")
          Source Code: $(cat ${{ env.SOURCE_CODE_URL_FILE }})

          编译未能成功完成，请查看附件中的 make.log 排查错误。
          日志文件可通过下方 Artifacts 或 Release 附件获取。
          EOF

      - name: 发布失败 Release (Create Failure Release - Draft)
        if: steps.compile.outputs.compile_completed == 'false'
        uses: softprops/action-gh-release@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.failed_release.outputs.release_tag }}
          name: "[编译失败] ${{ matrix.device }} - ${{ env.BUILD_DATETIME }}"
          body_path: release_failed.txt
          files: ${{ env.OPENWRT_DIR }}/make.log
          draft: true
          prerelease: true

      # ---------- 编译成功处理 ----------
      - name: 压缩完整 bin 目录并整理固件
        if: steps.compile.outputs.compile_completed == 'true'
        working-directory: ${{ env.OPENWRT_DIR }}
        run: |
          TARGET_DIR="bin/targets/mediatek/filogic"
          7z a -mx=9 -mmt=$(nproc) bin.7z bin/
          mkdir -p "$TARGET_DIR"
          mv bin.7z "$TARGET_DIR/"
          mv make.log "$TARGET_DIR/"
          cd "$TARGET_DIR"
          rm -rf packages
          echo "固件文件列表:"
          ls -la *.bin *.img *.trx *.chk *.sys *.rom *.fit *.itb *.7z *.log 2>/dev/null || true
          echo "TARGET_DIR=$TARGET_DIR" >> $GITHUB_ENV

      - name: 上传固件 Artifact (Upload Firmware Artifact)
        if: steps.compile.outputs.compile_completed == 'true'
        uses: actions/upload-artifact@main
        with:
          name: openwrt-firmware-${{ matrix.device }}
          path: ${{ env.OPENWRT_DIR }}/bin/targets/mediatek/filogic/
          retention-days: 30

      - name: 生成成功 Release 信息
        if: steps.compile.outputs.compile_completed == 'true'
        id: success_release
        run: |
          BUILD_DATETIME=$(date +"%Y%m%d%H%M")
          echo "BUILD_DATETIME=$BUILD_DATETIME" >> $GITHUB_ENV

          RELEASE_TAG="${{ matrix.device }}-${BUILD_DATETIME}-${{ github.run_id }}"
          echo "release_tag=$RELEASE_TAG" >> $GITHUB_OUTPUT

          cat > release_success.txt <<EOF
          ImmortalWRT Build for ${{ matrix.device }}
          ==========================================
          Build Date: $(date)
          Device: ${{ matrix.device }}
          Target: mediatek/filogic
          Config File: $(basename "${{ env.CONFIG_FILE }}")
          Source Code: $(cat ${{ env.SOURCE_CODE_URL_FILE }})

          Included Files:
          - Full bin.7z (complete bin directory compressed)
          - Firmware images (factory/sysupgrade)
          - Compilation log (make.log)
          EOF

      - name: 发布成功 Release (Create Release)
        if: steps.compile.outputs.compile_completed == 'true'
        uses: softprops/action-gh-release@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.success_release.outputs.release_tag }}
          name: "ImmortalWRT ${{ matrix.device }} - ${{ env.BUILD_DATETIME }}"
          body_path: release_success.txt
          files: ${{ env.OPENWRT_DIR }}/bin/targets/mediatek/filogic/*
          draft: false
          prerelease: false
