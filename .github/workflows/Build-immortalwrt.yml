name: 编译immortalwrt (Compile immortalwrt)

on:
  schedule:
    - cron: 0 3 * * 3,6
  repository_dispatch:
  workflow_dispatch:

env:
  TZ: Asia/Shanghai
  OPENWRT_DIR: /workdir/openwrt
  SOURCE_CODE_URL_FILE: ${{ github.workspace }}/config/immortalwrt-url.txt

jobs:
  prepare:
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: 检查仓库 (Checkout Repository)
        uses: actions/checkout@main
        with:
          fetch-depth: 1

      - name: 生成编译矩阵 (Generate Build Matrix)
        id: set-matrix
        run: |
          ENABLE_FILE="${{ github.workspace }}/config/immortalwrt-mt7981-enable-configs.txt"
          CONFIG_DIR="${{ github.workspace }}/config/immortalwrt-mt7981"

          if [ ! -f "$ENABLE_FILE" ]; then
            echo "::error::启用配置文件不存在: $ENABLE_FILE"
            exit 1
          fi

          # 读取要编译的设备名列表，存入数组（过滤空行和注释）
          mapfile -t ENABLED_DEVICES < <(grep -v '^[[:space:]]*#' "$ENABLE_FILE" | grep -v '^[[:space:]]*$')
          if [ ${#ENABLED_DEVICES[@]} -eq 0 ]; then
            echo "::error::启用配置文件中未包含任何设备"
            exit 1
          fi
          echo "启用的设备: ${ENABLED_DEVICES[*]}"

          # 扫描配置文件目录，匹配格式：immortalwrt-actions-mt7981-*.config
          # 文件名格式：immortalwrt-actions-mt7981-{设备名}-{14位日期}.config
          declare -A LATEST_CONFIGS
          declare -A LATEST_DATETIME
          while IFS= read -r -d '' file; do
            filename=$(basename "$file")
            if [[ "$filename" =~ ^immortalwrt-actions-mt7981-(.+)-([0-9]{14})\.config$ ]]; then
              device="${BASH_REMATCH[1]}"
              datetime="${BASH_REMATCH[2]}"
              if [[ " ${ENABLED_DEVICES[*]} " == *" $device "* ]]; then
                if [[ -z "${LATEST_CONFIGS[$device]}" ]] || [[ "$datetime" > "${LATEST_DATETIME[$device]}" ]]; then
                  LATEST_CONFIGS["$device"]="$file"
                  LATEST_DATETIME["$device"]="$datetime"
                fi
              fi
            fi
          done < <(find "$CONFIG_DIR" -maxdepth 1 -type f -name "immortalwrt-actions-mt7981-*.config" -print0)

          # 输出匹配结果
          for dev in "${!LATEST_CONFIGS[@]}"; do
            echo "设备 [$dev] 使用配置: ${LATEST_CONFIGS[$dev]} (日期: ${LATEST_DATETIME[$dev]})"
          done

          # 生成 JSON 矩阵
          JSON_ARRAY="["
          first=true
          for dev in "${ENABLED_DEVICES[@]}"; do
            if [ -n "${LATEST_CONFIGS[$dev]}" ]; then
              if [ "$first" = true ]; then
                first=false
              else
                JSON_ARRAY+=","
              fi
              JSON_ARRAY+="{\"device\":\"$dev\",\"config\":\"${LATEST_CONFIGS[$dev]}\"}"
            else
              echo "::warning::设备 [$dev] 在启用列表中但未找到对应的配置文件，已跳过"
            fi
          done
          JSON_ARRAY+="]"

          echo "matrix=$JSON_ARRAY" >> $GITHUB_OUTPUT
          echo "::group::生成的矩阵 JSON"
          echo "$JSON_ARRAY" | jq .
          echo "::endgroup::"

  build:
    needs: prepare
    if: needs.prepare.outputs.matrix != '[]'
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.prepare.outputs.matrix) }}
    env:
      DEVICE_NAME: ${{ matrix.device }}
      CONFIG_FILE: ${{ matrix.config }}

    steps:
    - name: 检查仓库 (Checkout Repository)
      uses: actions/checkout@main
      with:
        fetch-depth: 1

    - name: 设置系统时区 (Set System Timezone)
      run: |
        sudo timedatectl set-timezone "$TZ"
        date

    - name: 创建工作目录 (Create Work Directory)
      run: |
        sudo mkdir -p /workdir
        sudo chown $USER:$GROUPS /workdir
        echo "Work directory created at /workdir"

    - name: 释放磁盘空间 (Free Disk Space)
      uses: jlumbroso/free-disk-space@main
      with:
        tool-cache: false
        android: true
        dotnet: true
        haskell: true
        large-packages: true
        docker-images: true
        swap-storage: true

    - name: 检查可用磁盘空间 (Check Available Disk Space)
      run: |
        echo "Available disk space before installing packages:"
        df -h

    - name: 安装必要软件包 (Install Necessary Packages)
      run: |
        echo "Installing necessary packages..."
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          ecj \
          fastjar \
          file \
          flex \
          g++ \
          gcc-multilib \
          g++-multilib \
          gawk \
          gettext \
          git \
          git-core \
          java-propose-classpath \
          libelf-dev \
          libncurses5-dev \
          libncursesw5-dev \
          libssl-dev \
          swig \
          python3 \
          python3-pip \
          python3-dev \
          python3-setuptools \
          python3-pyelftools \
          subversion \
          unzip \
          wget \
          zlib1g-dev \
          rsync \
          qemu-utils \
          zip \
          libfuse-dev \
          neofetch \
          p7zip-full \
          curl \
          device-tree-compiler \
          gperf \
          haveged \
          help2man \
          intltool \
          lib32gcc-s1 \
          libc6-dev-i386 \
          libglib2.0-dev \
          libgmp3-dev \
          libltdl-dev \
          libmpc-dev \
          libmpfr-dev \
          libncurses-dev \
          libpython3-dev \
          libreadline-dev \
          libtool \
          libyaml-dev \
          libz-dev \
          lld \
          llvm \
          lrzsz \
          mkisofs \
          msmtp \
          nano \
          ninja-build \
          p7zip \
          patch \
          pkgconf \
          python3-ply \
          python3-docutils \
          re2c \
          rsync \
          scons \
          squashfs-tools \
          texinfo \
          uglifyjs \
          upx-ucl \
          vim \
          xmlto \
          xxd \
          zstd
        pip install requests tqdm
        echo "Packages installed successfully"

    - name: 检查可用磁盘空间 (Check Available Disk Space After Package Installation)
      run: |
        echo "Available disk space after installing packages:"
        df -h

    - name: 拉取源码 (Pull Source Code)
      working-directory: /workdir
      run: |
        echo "Cloning source code from: $(cat ${{ env.SOURCE_CODE_URL_FILE }})"
        git clone $(cat ${{ env.SOURCE_CODE_URL_FILE }}) openwrt
        echo "Source code cloned successfully"

    - name: 链接源码目录 (Link Source Code Directory)
      run: |
        ln -sf ${{ env.OPENWRT_DIR }} ${{ github.workspace }}/openwrt
        echo "Linked source code to workspace"

    - name: 更新源码 (Update Source Code)
      working-directory: ${{ env.OPENWRT_DIR }}
      run: |
        git fetch --all
        git reset --hard origin/HEAD
        echo "Source code updated to latest version"

    - name: 更新Feed (Update Feeds)
      working-directory: ${{ env.OPENWRT_DIR }}
      run: |
        ./scripts/feeds update -a
        echo "Feeds updated successfully"

    - name: 安装Feed (Install Feeds)
      working-directory: ${{ env.OPENWRT_DIR }}
      run: |
        ./scripts/feeds install -a
        echo "Feeds installed successfully"

    - name: 准备配置并下载包 (Prepare Config and Download Packages)
      working-directory: ${{ env.OPENWRT_DIR }}
      run: |
        echo "System information:"
        sudo neofetch || echo "neofetch not available"

        echo "Copying configuration file: ${{ env.CONFIG_FILE }}"
        cp "${{ env.CONFIG_FILE }}" .config

        echo "Starting package downloads..."
        bash ${{ github.workspace }}/script/x-wrt-make-001.sh
        echo "Configuration and package preparation completed"

    - name: 编译固件 (Compile Firmware)
      working-directory: ${{ env.OPENWRT_DIR }}
      run: |
        echo "开始编译设备: ${{ env.DEVICE_NAME }} (Starting compilation for device: ${{ env.DEVICE_NAME }})"
        echo -e "$(nproc) thread compile"
        echo "编译已开始，日志文件 make.log (Compilation started, log in make.log)"

        # 检查配置
        if [ ! -f ".config" ]; then
          echo "错误：配置文件不存在 (Error: Config file does not exist)"
          exit 1
        fi

        # 开始编译
        make -j$(nproc) V=s 2>&1 | tee make.log

        # 检查编译结果
        if [ ${PIPESTATUS[0]} -ne 0 ]; then
          echo "编译失败 (Compilation failed)"
          tail -50 make.log
          exit 1
        fi

        echo "编译成功完成 (Compilation completed successfully)"

        # 提取固件目标目录
        TARGET_DIR="bin/targets/mediatek/filogic"
        if [ ! -d "$TARGET_DIR" ]; then
          echo "错误：固件目录不存在 $TARGET_DIR"
          exit 1
        fi

        echo "TARGET_DIR=$TARGET_DIR" >> $GITHUB_ENV

        # 生成日期时间戳
        BUILD_DATETIME=$(date +"%Y%m%d%H%M")
        echo "BUILD_DATETIME=$BUILD_DATETIME" >> $GITHUB_ENV

        echo "设备: ${{ env.DEVICE_NAME }}"
        echo "构建时间: $BUILD_DATETIME"

    - name: 压缩bin目录 (Compress Full Bin Directory)
      working-directory: ${{ env.OPENWRT_DIR }}
      run: |
        echo "压缩完整bin目录 (Compressing full bin directory)..."
        7z a -mx=9 -mmt=$(nproc) bin.7z bin/
        echo "Bin directory compressed to bin.7z"

        # 移动到固件目录以便统一上传
        mv bin.7z "${{ env.TARGET_DIR }}/"
        mv make.log "${{ env.TARGET_DIR }}/"
        echo "Files moved to ${{ env.TARGET_DIR }}"

    - name: 检查最终空间使用情况 (Check Final Space Usage)
      if: always()
      run: |
        echo "Final disk usage:"
        df -hT
        echo "OpenWRT directory size:"
        du -sh ${{ env.OPENWRT_DIR }}

    - name: 整理固件文件 (Organize Firmware Files)
      run: |
        cd "${{ env.OPENWRT_DIR }}/${{ env.TARGET_DIR }}"
        echo "Removing packages directory..."
        rm -rf packages

        echo "固件文件列表 (Firmware files):"
        ls -la *.bin *.img *.trx *.chk *.sys *.rom *.fit *.7z *.log 2>/dev/null || echo "No standard firmware files found"
        find . -maxdepth 1 \( -name "*.bin" -o -name "*.img" -o -name "*.trx" -o -name "*.chk" -o -name "*.sys" -o -name "*.rom" -o -name "*.fit" -o -name "*factory*" -o -name "*sysupgrade*" -o -name "*.7z" -o -name "make.log" \) -type f

    - name: 生成发布标签与描述 (Generate Release Tag and Description)
      id: tag
      run: |
        RELEASE_TAG="${{ env.DEVICE_NAME }}-${{ env.BUILD_DATETIME }}"
        echo "release_tag=$RELEASE_TAG" >> $GITHUB_OUTPUT
        echo "Generated release tag: $RELEASE_TAG"

        cat > release.txt <<EOF
        ImmortalWRT Build for ${{ env.DEVICE_NAME }}
        ==========================================
        Build Date: $(date)
        Device: ${{ env.DEVICE_NAME }}
        Target: mediatek/filogic
        Config File: $(basename "${{ env.CONFIG_FILE }}")
        Source Code: $(cat ${{ env.SOURCE_CODE_URL_FILE }})

        Included Files:
        - Full bin.7z (complete bin directory compressed)
        - Firmware images (factory/sysupgrade)
        - Compilation log (make.log)
        EOF

        echo "Release description:"
        cat release.txt

    - name: 发布固件 (Release Firmware)
      uses: softprops/action-gh-release@master
      if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ steps.tag.outputs.release_tag }}
        name: "ImmortalWRT ${{ env.DEVICE_NAME }} - ${{ env.BUILD_DATETIME }}"
        body_path: release.txt
        files: ${{ env.OPENWRT_DIR }}/${{ env.TARGET_DIR }}/*
        draft: false
        prerelease: false
