name: 编译immortalwrt (Compile immortalwrt)

on:
  schedule:
    - cron: 0 3 * * 3,6
  repository_dispatch:
  workflow_dispatch:
    inputs:
      ssh:
        description: "Dont care, and don't touch it!"
        required: true
        default: 'false'

env:
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@main

    - name: Free Disk Space (Ubuntu)
      uses: jlumbroso/free-disk-space@main
      with:
        tool-cache: false
        android: true
        dotnet: true
        haskell: true
        large-packages: true
        docker-images: true
        swap-storage: true

    - name: 初始化环境 (Initialize environment)
      run: |
        sudo timedatectl set-timezone "$TZ"
        sudo mkdir -p /workdir
        sudo chown $USER:$GROUPS /workdir
        echo "Environment initialized"

    - name: 安装必要软件包 (Install necessary packages)
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential ecj fastjar file flex g++ gcc-multilib g++-multilib gawk gettext git git-core java-propose-classpath libelf-dev libncurses5-dev libncursesw5-dev libssl-dev swig python3 python3-pip python3-dev python3-setuptools python3-pyelftools subversion unzip wget zlib1g-dev rsync qemu-utils zip libfuse-dev neofetch p7zip-full curl device-tree-compiler gperf haveged help2man intltool lib32gcc-s1 libc6-dev-i386 libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses-dev libpython3-dev libreadline-dev libtool libyaml-dev libz-dev lld llvm lrzsz mkisofs msmtp nano ninja-build p7zip patch pkgconf python3-ply python3-docutils re2c rsync scons squashfs-tools texinfo uglifyjs upx-ucl vim xmlto xxd zstd
        pip install requests tqdm

    - name: 拉取源码 (Pull source code)
      working-directory: /workdir
      run: |
        git clone $(cat $GITHUB_WORKSPACE/config/immortalwrt-url.txt) openwrt
        ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt
        cd openwrt
        git pull

    - name: 更新Feed (Update Feed)
      working-directory: /workdir/openwrt
      run: |
        bash $GITHUB_WORKSPACE/script/immortalwrt-ip.sh
        ./scripts/feeds update -a

    - name: 安装Feed (Install Feed)
      working-directory: /workdir/openwrt
      run: |
        ./scripts/feeds install -a

    - name: 准备配置并下载包 (Prepare config and download packages)
      working-directory: /workdir/openwrt
      run: |
        sudo neofetch
        cp $GITHUB_WORKSPACE/config/$(cat $GITHUB_WORKSPACE/config/immortalwrt-config_name.txt) .config
        bash $GITHUB_WORKSPACE/script/x-wrt-make-001.sh

    - name: 编译固件 (Compile Firmware)
      working-directory: /workdir/openwrt
      run: |
        echo "开始编译"
        echo -e "$(nproc) thread compile"
        echo "编译已开始，日志文件 make.log"
        make -j$(nproc) 2>&1 | tee make.log
        grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME
        [ -s DEVICE_NAME ] && echo "DEVICE_NAME=_$(cat DEVICE_NAME)" >> $GITHUB_ENV
        echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV
        echo "压缩bin目录...... (Compressing bin directories ......)"
        7z a -mx=9 -mmt=8 bin.7z bin
        mv bin.7z bin/targets/mediatek/filogic/
        mv make_download.log bin/targets/mediatek/filogic/
        mv make.log bin/targets/mediatek/filogic/

    - name: 检查空间使用情况 (Check space usage)
      if: (!cancelled())
      run: df -hT

    - name: 上传bin目录 (Upload bin directory)
      uses: actions/upload-artifact@main
      with:
        name: OpenWrt_bin${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: /workdir/openwrt/bin
        compression-level: 9

    - name: 整理文件 (Sort out documents)
      id: organize
      run: |
        cd /workdir/openwrt/bin/targets/*/*
        rm -rf packages
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV

    - name: 上传固件目录 (Upload firmware directory)
      uses: actions/upload-artifact@v4
      with:
        name: OpenWrt_firmware${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: ${{ env.FIRMWARE }}
        compression-level: 9

    - name: 生成发布标签 (Generate publish tags)
      id: tag
      run: |
        echo "release_tag=$(date +"%Y.%m.%d-%H%M")-immortalwrt" >> $GITHUB_OUTPUT
        touch release.txt
        bash $GITHUB_WORKSPACE/script/immortalwrt-actions-txt.sh

    - name: 上传固件以发布 (Upload firmware for release)
      uses: softprops/action-gh-release@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ steps.tag.outputs.release_tag }}
        body_path: release.txt
        files: ${{ env.FIRMWARE }}/*