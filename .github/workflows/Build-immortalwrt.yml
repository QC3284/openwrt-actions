name: 编译immortalwrt (Compile immortalwrt)

on:
  schedule:
    - cron: '0 3 * * 3,6'
  repository_dispatch:
  workflow_dispatch:
    inputs:
      resume_device:
        description: '要恢复编译的设备名（留空表示全新编译）'
        required: false
        type: string
      state_artifact_name:
        description: '保存状态的 Artifact 名称（恢复时使用）'
        required: false
        type: string

env:
  TZ: Asia/Shanghai
  OPENWRT_DIR: /workdir/openwrt
  SOURCE_CODE_URL_FILE: ${{ github.workspace }}/config/immortalwrt-url.txt

# 并发控制：同一设备同一时间只允许一个编译任务（包括恢复触发）
concurrency:
  group: ${{ github.workflow }}-${{ github.event.inputs.resume_device || 'all' }}
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: 检查仓库 (Checkout Repository)
        uses: actions/checkout@main
        with:
          fetch-depth: 1

      - name: 生成编译矩阵 (Generate Build Matrix)
        id: set-matrix
        run: |
          ENABLE_FILE="${{ github.workspace }}/config/immortalwrt-mt7981-enable-configs.txt"
          CONFIG_DIR="${{ github.workspace }}/config/immortalwrt-mt7981"

          if [ ! -f "$ENABLE_FILE" ]; then
            echo "::error::启用配置文件不存在: $ENABLE_FILE"
            exit 1
          fi

          mapfile -t ENABLED_DEVICES < <(grep -v '^[[:space:]]*#' "$ENABLE_FILE" | grep -v '^[[:space:]]*$')
          if [ ${#ENABLED_DEVICES[@]} -eq 0 ]; then
            echo "::error::启用配置文件中未包含任何设备"
            exit 1
          fi
          echo "启用的设备: ${ENABLED_DEVICES[*]}"

          declare -A LATEST_CONFIGS
          declare -A LATEST_DATETIME
          while IFS= read -r -d '' file; do
            filename=$(basename "$file")
            if [[ "$filename" =~ ^immortalwrt-actions-mt7981-(.+)-([0-9]{14})\.config$ ]]; then
              device="${BASH_REMATCH[1]}"
              datetime="${BASH_REMATCH[2]}"
              if [[ " ${ENABLED_DEVICES[*]} " == *" $device "* ]]; then
                if [[ -z "${LATEST_CONFIGS[$device]}" ]] || [[ "$datetime" > "${LATEST_DATETIME[$device]}" ]]; then
                  LATEST_CONFIGS["$device"]="$file"
                  LATEST_DATETIME["$device"]="$datetime"
                fi
              fi
            fi
          done < <(find "$CONFIG_DIR" -maxdepth 1 -type f -name "immortalwrt-actions-mt7981-*.config" -print0)

          for dev in "${!LATEST_CONFIGS[@]}"; do
            echo "设备 [$dev] 使用配置: ${LATEST_CONFIGS[$dev]} (日期: ${LATEST_DATETIME[$dev]})"
          done

          JSON_ARRAY="["
          first=true
          for dev in "${ENABLED_DEVICES[@]}"; do
            if [ -n "${LATEST_CONFIGS[$dev]}" ]; then
              if [ "$first" = true ]; then
                first=false
              else
                JSON_ARRAY+=","
              fi
              JSON_ARRAY+="{\"device\":\"$dev\",\"config\":\"${LATEST_CONFIGS[$dev]}\"}"
            else
              echo "::warning::设备 [$dev] 未找到配置文件，已跳过"
            fi
          done
          JSON_ARRAY+="]"

          echo "matrix=$JSON_ARRAY" >> $GITHUB_OUTPUT
          echo "::group::生成的矩阵 JSON"
          echo "$JSON_ARRAY" | jq .
          echo "::endgroup::"

  compile:
    needs: prepare
    if: needs.prepare.outputs.matrix != '[]'
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.prepare.outputs.matrix) }}
    env:
      DEVICE_NAME: ${{ matrix.device }}
      CONFIG_FILE: ${{ matrix.config }}
    outputs:
      needs_resume: ${{ steps.set-output.outputs.needs_resume }}
      resume_device: ${{ steps.set-output.outputs.resume_device }}
      state_artifact_name: ${{ steps.set-output.outputs.state_artifact_name }}
      compile_success: ${{ steps.set-output.outputs.compile_success }}
      device: ${{ steps.set-output.outputs.device }}
      config_file: ${{ steps.set-output.outputs.config_file }}
      build_datetime: ${{ steps.set-output.outputs.build_datetime }}
      target_dir: ${{ steps.set-output.outputs.target_dir }}
    steps:
      - name: 检查仓库 (Checkout Repository)
        uses: actions/checkout@main
        with:
          fetch-depth: 1

      - name: 判断是否为恢复运行 (Check Resume Mode)
        id: check-resume
        run: |
          if [ -n "${{ github.event.inputs.resume_device }}" ] && [ "${{ github.event.inputs.resume_device }}" == "${{ matrix.device }}" ]; then
            echo "is_resume=true" >> $GITHUB_OUTPUT
            echo "state_artifact_name=${{ github.event.inputs.state_artifact_name }}" >> $GITHUB_OUTPUT
            echo "::notice::以恢复模式运行，设备: ${{ matrix.device }}"
          else
            echo "is_resume=false" >> $GITHUB_OUTPUT
            echo "::notice::以全新模式运行，设备: ${{ matrix.device }}"
          fi

      - name: 设置系统时区 (Set System Timezone)
        run: |
          sudo timedatectl set-timezone "$TZ"
          date

      - name: 创建工作目录 (Create Work Directory)
        run: |
          sudo mkdir -p /workdir
          sudo chown $USER:$GROUPS /workdir

      - name: 释放磁盘空间 (Free Disk Space)
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: 安装必要软件包 (Install Necessary Packages)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential ecj fastjar file flex g++ gcc-multilib g++-multilib gawk gettext git git-core \
            java-propose-classpath libelf-dev libncurses5-dev libncursesw5-dev libssl-dev swig python3 \
            python3-pip python3-dev python3-setuptools python3-pyelftools subversion unzip wget zlib1g-dev \
            rsync qemu-utils zip libfuse-dev neofetch p7zip-full curl device-tree-compiler gperf haveged \
            help2man intltool lib32gcc-s1 libc6-dev-i386 libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev \
            libmpfr-dev libncurses-dev libpython3-dev libreadline-dev libtool libyaml-dev libz-dev lld llvm \
            lrzsz mkisofs msmtp nano ninja-build p7zip patch pkgconf python3-ply python3-docutils re2c \
            scons squashfs-tools texinfo uglifyjs upx-ucl vim xmlto xxd zstd zstd
          pip install requests tqdm

      - name: 下载并恢复编译状态 (Download and Restore Build State)
        if: steps.check-resume.outputs.is_resume == 'true'
        uses: actions/download-artifact@main
        with:
          name: ${{ steps.check-resume.outputs.state_artifact_name }}
          path: /workdir/state/

      - name: 解压编译状态 (Extract Build State)
        if: steps.check-resume.outputs.is_resume == 'true'
        working-directory: /workdir
        run: |
          echo "恢复编译状态..."
          tar -I 'zstd -d' -xf state/openwrt_state.tar.zst
          rm -rf state
          echo "恢复完成"

      - name: 恢复后补充 feeds 与下载包 (Post-resume Feeds Update & Download)
        if: steps.check-resume.outputs.is_resume == 'true'
        working-directory: ${{ env.OPENWRT_DIR }}
        run: |
          echo "重新更新 feeds..."
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          echo "下载缺失的源码包..."
          make download -j$(nproc) V=s || true

      - name: 拉取源码 (Pull Source Code) [全新编译时执行]
        if: steps.check-resume.outputs.is_resume != 'true'
        working-directory: /workdir
        run: |
          git clone $(cat ${{ env.SOURCE_CODE_URL_FILE }}) openwrt

      - name: 链接源码目录 (Link Source Code Directory)
        run: |
          ln -sf ${{ env.OPENWRT_DIR }} ${{ github.workspace }}/openwrt

      - name: 更新源码 (Update Source Code) [全新编译时执行]
        if: steps.check-resume.outputs.is_resume != 'true'
        working-directory: ${{ env.OPENWRT_DIR }}
        run: |
          git fetch --all
          git reset --hard origin/HEAD

      - name: 更新并安装Feeds [全新编译时执行]
        if: steps.check-resume.outputs.is_resume != 'true'
        working-directory: ${{ env.OPENWRT_DIR }}
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 准备配置文件 [全新编译时执行]
        if: steps.check-resume.outputs.is_resume != 'true'
        working-directory: ${{ env.OPENWRT_DIR }}
        run: |
          cp "${{ env.CONFIG_FILE }}" .config
          bash ${{ github.workspace }}/script/x-wrt-make-001.sh

      - name: 编译固件并监控超时 (Compile with Timeout Monitoring)
        id: compile
        working-directory: ${{ env.OPENWRT_DIR }}
        timeout-minutes: 350
        run: |
          THREAD_COUNT=$(($(nproc) + 1))
          echo "使用 $THREAD_COUNT 线程编译"

          # 启动后台编译
          make -j$THREAD_COUNT V=s &> make.log &
          MAKE_PID=$!
          echo "编译进程 PID: $MAKE_PID"

          SECONDS=0
          TIMEOUT_SECONDS=$(( 300 * 60 ))   # 300 分钟

          while kill -0 $MAKE_PID 2>/dev/null; do
            sleep 10
            if [ $SECONDS -gt $TIMEOUT_SECONDS ]; then
              echo "::warning::编译已运行 ${SECONDS} 秒，接近任务时间上限，主动停止以保存进度。"
              pkill -P $MAKE_PID 2>/dev/null || true
              kill -TERM $MAKE_PID 2>/dev/null || true
              for i in {1..30}; do
                if ! kill -0 $MAKE_PID 2>/dev/null; then
                  break
                fi
                sleep 1
              done
              if kill -0 $MAKE_PID 2>/dev/null; then
                echo "进程未响应，强制终止"
                pkill -KILL -P $MAKE_PID 2>/dev/null || true
                kill -KILL $MAKE_PID 2>/dev/null || true
              fi
              wait $MAKE_PID 2>/dev/null || true
              echo "compile_completed=false" >> $GITHUB_OUTPUT
              exit 0
            fi
          done

          wait $MAKE_PID
          MAKE_EXIT_CODE=$?

          if [ $MAKE_EXIT_CODE -ne 0 ]; then
            echo "编译失败，退出码: $MAKE_EXIT_CODE"
            tail -100 make.log
            exit 1
          fi

          echo "编译成功完成！"
          echo "compile_completed=true" >> $GITHUB_OUTPUT

      - name: 打包编译状态 (优化压缩与排除，最大化保留进度) (Package Build State - Optimized)
        if: steps.compile.outputs.compile_completed == 'false'
        working-directory: /workdir
        run: |
          echo "正在打包编译目录（高压缩等级，排除体积大但重建快的部分，保留目标平台编译进度）..."
          # 排除规则说明：
          # - tmp/ : 临时文件
          # - dl/ : 下载包缓存（恢复后通过 make download 重新获取）
          # - feeds/ : feeds 索引（恢复后通过 feeds update 重建）
          # - .git/ : 版本控制元数据，与编译无关
          # - build_dir/target-*/linux-* : 内核编译中间文件（体积巨大，但内核重编速度快）
          # - build_dir/target-*/rootfs-* : rootfs 打包临时文件
          # 保留 build_dir/target-* 下的其他 .o 文件，最大限度保留进度
          tar \
            --exclude='openwrt/tmp' \
            --exclude='openwrt/dl' \
            --exclude='openwrt/feeds' \
            --exclude='openwrt/.git' \
            --exclude='openwrt/build_dir/target-*/linux-*' \
            --exclude='openwrt/build_dir/target-*/rootfs-*' \
            -I 'zstd -19 -T0 --long' \
            -cf openwrt_state.tar.zst openwrt
          mkdir -p state_upload
          mv openwrt_state.tar.zst state_upload/
          echo "打包完成，压缩包大小："
          du -h state_upload/openwrt_state.tar.zst

      - name: 生成状态 Artifact 名称 (Generate Artifact Name)
        id: artifact-name
        if: steps.compile.outputs.compile_completed == 'false'
        run: |
          ARTIFACT_NAME="openwrt-state-${{ matrix.device }}-$(date +%Y%m%d%H%M%S)"
          echo "name=$ARTIFACT_NAME" >> $GITHUB_OUTPUT

      - name: 上传编译状态 (Upload Build State Artifact)
        if: steps.compile.outputs.compile_completed == 'false'
        uses: actions/upload-artifact@main
        with:
          name: ${{ steps.artifact-name.outputs.name }}
          path: /workdir/state_upload/
          retention-days: 7

      - name: 设置输出变量与全局环境变量 (Set Outputs and Env)
        id: set-output
        run: |
          TARGET_DIR="bin/targets/mediatek/filogic"
          BUILD_DATETIME=$(date +"%Y%m%d%H%M")

          echo "TARGET_DIR=$TARGET_DIR" >> $GITHUB_ENV
          echo "BUILD_DATETIME=$BUILD_DATETIME" >> $GITHUB_ENV

          echo "device=${{ matrix.device }}" >> $GITHUB_OUTPUT
          echo "config_file=${{ matrix.config }}" >> $GITHUB_OUTPUT
          echo "build_datetime=$BUILD_DATETIME" >> $GITHUB_OUTPUT
          echo "target_dir=$TARGET_DIR" >> $GITHUB_OUTPUT

          if [ "${{ steps.compile.outputs.compile_completed }}" = "false" ]; then
            echo "needs_resume=true" >> $GITHUB_OUTPUT
            echo "resume_device=${{ matrix.device }}" >> $GITHUB_OUTPUT
            echo "state_artifact_name=${{ steps.artifact-name.outputs.name }}" >> $GITHUB_OUTPUT
            echo "compile_success=false" >> $GITHUB_OUTPUT
          else
            echo "needs_resume=false" >> $GITHUB_OUTPUT
            echo "resume_device=" >> $GITHUB_OUTPUT
            echo "state_artifact_name=" >> $GITHUB_OUTPUT
            echo "compile_success=true" >> $GITHUB_OUTPUT
          fi

      - name: 压缩完整 bin 目录并整理固件 (Package Artifacts) [编译成功时]
        if: steps.compile.outputs.compile_completed == 'true'
        working-directory: ${{ env.OPENWRT_DIR }}
        run: |
          7z a -mx=9 -mmt=$(nproc) bin.7z bin/
          mkdir -p "$TARGET_DIR"
          mv bin.7z "$TARGET_DIR/"
          mv make.log "$TARGET_DIR/"
          cd "$TARGET_DIR"
          rm -rf packages
          echo "固件文件列表:"
          ls -la *.bin *.img *.trx *.chk *.sys *.rom *.fit *.itb *.7z *.log 2>/dev/null || true

      - name: 上传固件 Artifact (Upload Firmware Artifact) [编译成功时]
        if: steps.compile.outputs.compile_completed == 'true'
        uses: actions/upload-artifact@main
        with:
          name: openwrt-firmware-${{ matrix.device }}
          path: ${{ env.OPENWRT_DIR }}/${{ env.TARGET_DIR }}/
          retention-days: 30

  trigger-resume:
    needs: compile
    if: always() && needs.compile.result == 'success' && needs.compile.outputs.needs_resume == 'true'
    runs-on: ubuntu-24.04
    steps:
      - name: 触发恢复编译 (Trigger Resume Workflow)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DEVICE="${{ needs.compile.outputs.resume_device }}"
          ARTIFACT="${{ needs.compile.outputs.state_artifact_name }}"
          echo "将为设备 $DEVICE 触发新的恢复运行，Artifact: $ARTIFACT"

          # 等待片刻，避免瞬间并发触发过多
          sleep 5

          gh workflow run "Build-immortalwrt.yml" \
            --repo "${{ github.repository }}" \
            --ref "${{ github.ref }}" \
            --field resume_device="$DEVICE" \
            --field state_artifact_name="$ARTIFACT"

          echo "恢复任务已触发。"

  release:
    needs: compile
    if: needs.compile.result == 'success' && needs.compile.outputs.compile_success == 'true'
    runs-on: ubuntu-24.04
    steps:
      - name: 检查仓库 (Checkout Repository)
        uses: actions/checkout@main
        with:
          fetch-depth: 1

      - name: 下载固件 Artifact (Download Firmware Artifact)
        uses: actions/download-artifact@main
        with:
          name: openwrt-firmware-${{ needs.compile.outputs.device }}
          path: firmware/

      - name: 生成 Release 描述与唯一标签 (Generate Release Description & Unique Tag)
        id: tag
        run: |
          DEVICE="${{ needs.compile.outputs.device }}"
          BUILD_DATETIME="${{ needs.compile.outputs.build_datetime }}"
          RELEASE_TAG="${DEVICE}-${BUILD_DATETIME}-${{ github.run_id }}"
          echo "release_tag=$RELEASE_TAG" >> $GITHUB_OUTPUT

          cat > release.txt <<EOF
          ImmortalWRT Build for $DEVICE
          ==========================================
          Build Date: $(date)
          Device: $DEVICE
          Target: mediatek/filogic
          Config File: $(basename "${{ needs.compile.outputs.config_file }}")
          Source Code: $(cat ${{ env.SOURCE_CODE_URL_FILE }})

          Included Files:
          - Full bin.7z (complete bin directory compressed)
          - Firmware images (factory/sysupgrade)
          - Compilation log (make.log)
          EOF

      - name: 发布固件 (Create Release)
        uses: softprops/action-gh-release@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.tag.outputs.release_tag }}
          name: "ImmortalWRT ${{ needs.compile.outputs.device }} - ${{ needs.compile.outputs.build_datetime }}"
          body_path: release.txt
          files: firmware/*
          draft: false
          prerelease: false
